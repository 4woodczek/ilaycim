<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İLAY YILMAZ HEDEF TAHTASI - DARK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f1f5f9;
        }
        .ball {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
            border-width: 1px;
        }
        .ball:hover:not(.locked) {
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            filter: brightness(1.2);
        }
        .ball.locked {
            background-color: #059669 !important; /* Emerald 600 */
            color: #ecfdf5 !important;
            cursor: default;
            transform: scale(0.9);
            opacity: 0.4;
            border-color: #10b981 !important;
            box-shadow: none;
        }
        .progress-bar {
            transition: width 0.6s cubic-bezier(0.65, 0, 0.35, 1);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity */
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Özel Kaydırma Çubuğu */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Modal Animasyonu */
        .modal-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans overflow-x-hidden">

    <div class="max-w-5xl mx-auto">
        <!-- Başlık Bölümü -->
        <div class="glass-card rounded-3xl p-6 mb-8 sticky top-4 z-10 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-3xl font-black text-white tracking-tight uppercase">İLAY YILMAZ</h1>
                    <p class="text-slate-400 text-sm italic">Her küçük adım seni hedefine yaklaştırır.</p>
                </div>
                <div class="text-right">
                    <div class="text-4xl font-black text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.3)]" id="current-total">0₺</div>
                    <div class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Birikim / 50.000₺</div>
                </div>
            </div>

            <!-- İlerleme Çubuğu -->
            <div class="mt-8">
                <div class="flex justify-between text-xs mb-2 text-slate-300 font-semibold uppercase tracking-tighter">
                    <span id="progress-percent" class="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded">%0 Tamamlandı</span>
                    <span class="text-slate-400">Hedef: 50.000₺</span>
                </div>
                <div class="w-full bg-slate-900/50 rounded-full h-5 overflow-hidden border border-white/5 p-1">
                    <div id="progress-fill" class="progress-bar bg-gradient-to-r from-emerald-600 to-teal-400 h-full rounded-full w-0 shadow-[0_0_15px_rgba(16,185,129,0.4)]"></div>
                </div>
                <!-- Son İşlem Tarihi -->
                <div id="last-action-container" class="mt-3 text-center text-[10px] text-slate-500 font-bold uppercase tracking-widest hidden">
                    🕒 SON İŞLEM: <span id="last-action-date" class="text-slate-300">--/--/---- --:--</span>
                </div>
            </div>
        </div>

        <!-- Bilgi Kartları -->
        <div class="flex flex-wrap justify-center gap-4 mb-8">
            <div class="flex items-center gap-2 bg-blue-900/20 border border-blue-500/30 px-4 py-2 rounded-full shadow-lg">
                <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                <span class="text-xs font-bold text-blue-300">50₺</span>
            </div>
            <div class="flex items-center gap-2 bg-indigo-900/20 border border-indigo-500/30 px-4 py-2 rounded-full shadow-lg">
                <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                <span class="text-xs font-bold text-indigo-300">100₺</span>
            </div>
            <div class="flex items-center gap-2 bg-purple-900/20 border border-purple-500/30 px-4 py-2 rounded-full shadow-lg">
                <div class="w-3 h-3 rounded-full bg-purple-500"></div>
                <span class="text-xs font-bold text-purple-300">150₺</span>
            </div>
            <div class="flex items-center gap-2 bg-pink-900/20 border border-pink-500/30 px-4 py-2 rounded-full shadow-lg">
                <div class="w-3 h-3 rounded-full bg-pink-500"></div>
                <span class="text-xs font-bold text-pink-300">200₺</span>
            </div>
            <div class="flex items-center gap-2 bg-orange-900/20 border border-orange-500/30 px-4 py-2 rounded-full shadow-lg">
                <div class="w-3 h-3 rounded-full bg-orange-500"></div>
                <span class="text-xs font-bold text-orange-300">500₺</span>
            </div>
        </div>

        <!-- Toplar Izgarası -->
        <div id="balls-container" class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 lg:grid-cols-12 gap-4 pb-24">
            <!-- JS ile doldurulacak -->
        </div>
    </div>

    <!-- Onay Modalı -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4">
        <div id="modal-content" class="glass-card rounded-3xl shadow-2xl max-w-sm w-full p-8 transform transition-all scale-95 opacity-0 border border-white/20">
            <div class="text-center">
                <div class="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
                    💰
                </div>
                <h3 class="text-2xl font-bold text-white mb-3 tracking-tight">Birikim Onayı</h3>
                <p class="text-slate-400 mb-8 leading-relaxed">
                    <span id="modal-amount" class="font-black text-emerald-400 text-2xl block mb-1">0₺</span> 
                    tutarındaki bu miktarı kilitliyoruz. Emin misin?
                </p>
                <div class="flex flex-col gap-3">
                    <button id="confirm-btn" class="w-full py-4 rounded-2xl bg-emerald-500 text-slate-900 font-black text-lg hover:bg-emerald-400 transition-colors shadow-lg shadow-emerald-900/20">EVET, EKLE</button>
                    <button onclick="closeModal()" class="w-full py-3 rounded-2xl text-slate-400 font-bold hover:text-white transition-colors">Vazgeç</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bildirim -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-500 text-slate-900 px-8 py-4 rounded-2xl shadow-2xl transition-all duration-500 opacity-0 translate-y-4 pointer-events-none z-50 font-black uppercase tracking-tight flex items-center gap-3">
        <span>🚀</span>
        <span id="toast-msg"></span>
    </div>

    <script>
        const targetAmount = 50000;
        // Top listesini sabit bir sırada oluşturuyoruz
        const ballValues = [
            { val: 50, count: 100, color: 'bg-blue-900/30 border-blue-500/50 text-blue-300' },   
            { val: 100, count: 100, color: 'bg-indigo-900/30 border-indigo-500/50 text-indigo-300' }, 
            { val: 150, count: 60, color: 'bg-purple-900/30 border-purple-500/50 text-purple-300' }, 
            { val: 200, count: 55, color: 'bg-pink-900/30 border-pink-500/50 text-pink-300' },   
            { val: 500, count: 30, color: 'bg-orange-900/30 border-orange-500/50 text-orange-300' }  
        ];

        let lockedIndices = JSON.parse(localStorage.getItem('locked_balls_ilay')) || [];
        let lastActionDate = localStorage.getItem('last_action_date_ilay') || null;
        let currentPendingBall = null;

        function init() {
            const container = document.getElementById('balls-container');
            container.innerHTML = '';
            
            let allBalls = [];
            ballValues.forEach((group) => {
                for(let i = 0; i < group.count; i++) {
                    allBalls.push({ value: group.val, color: group.color });
                }
            });

            // ÖNEMLİ: Rastgele karıştırma (shuffle) fonksiyonunu kaldırdık. 
            // Böylece toplar her zaman aynı (50, 100, 150...) sırasıyla dizilecek.
            // Bu sayede index numarası (örneğin 10. top) her zaman aynı değere sahip olacak.

            allBalls.forEach((ball, idx) => {
                const div = document.createElement('div');
                div.className = `ball aspect-square flex items-center justify-center rounded-2xl border text-[11px] font-black shadow-lg ${ball.color}`;
                div.innerText = ball.value;
                div.dataset.index = idx;
                div.dataset.value = ball.value;
                
                if (lockedIndices.includes(idx.toString())) {
                    div.classList.add('locked');
                }

                div.onclick = () => openConfirmModal(div);
                container.appendChild(div);
            });

            updateUI();
        }

        function openConfirmModal(el) {
            if (el.classList.contains('locked')) return;
            
            currentPendingBall = el;
            document.getElementById('modal-amount').innerText = el.dataset.value + '₺';
            
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');
            
            setTimeout(() => {
                content.classList.add('modal-active');
                content.classList.remove('scale-95', 'opacity-0');
            }, 10);

            document.getElementById('confirm-btn').onclick = () => {
                confirmLock();
                closeModal();
            };
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            content.classList.remove('modal-active');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                overlay.classList.add('hidden');
                overlay.classList.remove('flex');
                currentPendingBall = null;
            }, 200);
        }

        function confirmLock() {
            if (!currentPendingBall) return;
            const idx = currentPendingBall.dataset.index;
            const val = parseInt(currentPendingBall.dataset.value);

            currentPendingBall.classList.add('locked');
            lockedIndices.push(idx.toString());
            
            const now = new Date();
            lastActionDate = now.toLocaleDateString('tr-TR') + ' ' + now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            
            saveData();
            updateUI();
            showToast(`${val}₺ HEDEFE EKLENDİ!`);
        }

        function updateUI() {
            let total = 0;
            // Toplam hesaplanırken sadece görsel olarak kilitli olanları değil,
            // sabit değerleri üzerinden hesaplama yapıyoruz.
            const lockedElements = document.querySelectorAll('.ball.locked');
            lockedElements.forEach(el => {
                total += parseInt(el.dataset.value);
            });

            const percent = (total / targetAmount) * 100;
            document.getElementById('current-total').innerText = total.toLocaleString('tr-TR') + '₺';
            document.getElementById('progress-fill').style.width = `${Math.min(percent, 100)}%`;
            document.getElementById('progress-percent').innerText = `%${Math.floor(percent)} TAMAMLANDI`;

            const dateContainer = document.getElementById('last-action-container');
            const dateSpan = document.getElementById('last-action-date');
            if (lastActionDate) {
                dateContainer.classList.remove('hidden');
                dateSpan.innerText = lastActionDate;
            }
        }

        function saveData() {
            localStorage.setItem('locked_balls_ilay', JSON.stringify(lockedIndices));
            localStorage.setItem('last_action_date_ilay', lastActionDate);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => { 
                toast.style.opacity = '0'; 
                toast.style.transform = 'translateX(-50%) translateY(16px)';
            }, 2000);
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('modal-overlay')) closeModal();
        }

        window.onload = init;
    </script>
</body>
</html>
